workflows:

  # ══════════════════════════════════════════════════════════════════
  # WORKFLOW 1 — NaturaBridgeB iOS (iPhone + iPad) → TestFlight
  # ══════════════════════════════════════════════════════════════════
  naturabridgeb-ios-testflight:
    name: "NaturaBridgeB — iPhone + iPad → TestFlight"
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      vars:
        BUNDLE_ID:       "com.naturabridge.business"
        VERSION_NUMBER:  "1.0.0"
        APPLE_TEAM_ID:   "V44J4P68PU"
      node: "20"
      xcode: latest
      cocoapods: "1.15.2"

    scripts:

      # ── Step 1: Install Node + Capacitor dependencies ─────────────
      - name: Install Node dependencies
        script: |
          npm ci

      # ── Step 2: Generate the native iOS Xcode project ─────────────
      - name: Generate iOS project (cap add ios)
        script: |
          npx cap add ios
          npx cap sync ios

      # ── Step 3: Install CocoaPods ─────────────────────────────────
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      # ── Step 4: Set up code signing + generate ExportOptions ─────────
      - name: Set up code signing
        script: |
          keychain initialize

          app-store-connect fetch-signing-files \
            --bundle-id "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-types IOS_DISTRIBUTION \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create \
            --save

          keychain add-certificates

          # Get cert name and profile UUID while still in this shell scope
          CERT_NAME=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID xml1 -o - - | sed 's/.*<string>\(.*\)<\/string>.*/\1/')

          echo "Certificate: $CERT_NAME"
          echo "Profile UUID: $PROFILE_UUID"

          # Persist for later steps
          echo "CODE_SIGNING_IDENTITY=$CERT_NAME" >> "$CM_ENV"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$CM_ENV"

          # Copy pre-committed ExportOptions (automatic signing, app-store-connect method)
          cp build-config/ExportOptions-iOS.plist ios/App/ExportOptions-iOS.plist
          echo "ExportOptions copied"

      # ── Step 6: Set build number ───────────────────────────────────
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      # ── Step 7: Build and archive for iOS ─────────────────────────
      - name: Build iOS archive
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive" \
            -destination "generic/platform=iOS" \
            OTHER_CODE_SIGN_FLAGS="--keychain $(echo $CM_KEYCHAIN_PATH)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_IDENTITY="$CODE_SIGNING_IDENTITY" \
            archive | xcpretty

      # ── Step 8: Export to IPA ──────────────────────────────────────
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive" \
            -exportOptionsPlist ios/App/ExportOptions-iOS.plist \
            -exportPath "$CM_BUILD_DIR/build/ipa-ios"

      # ── Step 9: Upload to TestFlight ───────────────────────────────
      - name: Upload to TestFlight
        script: |
          APP_FILE=$(find "$CM_BUILD_DIR/build/ipa-ios" -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --file "$APP_FILE" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - $CM_BUILD_DIR/build/ipa-ios/*.ipa
      - $CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@alphainception.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"


  # ══════════════════════════════════════════════════════════════════
  # WORKFLOW 2 — NaturaBridgeB macOS (Mac Catalyst) → TestFlight
  # ══════════════════════════════════════════════════════════════════
  naturabridgeb-macos-testflight:
    name: "NaturaBridgeB — Mac → TestFlight"
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      vars:
        BUNDLE_ID:       "com.naturabridge.business"
        VERSION_NUMBER:  "1.0.0"
        APPLE_TEAM_ID:   "V44J4P68PU"
      node: "20"
      xcode: latest
      cocoapods: "1.15.2"

    scripts:

      - name: Install Node dependencies
        script: |
          npm ci

      - name: Generate iOS project (cap add ios)
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Enable Mac Catalyst in Xcode project
        script: |
          gem install xcodeproj --quiet
          ruby << 'RUBY'
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
            project.targets.each do |target|
              next unless target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['SUPPORTS_MACCATALYST']                        = 'YES'
                config.build_settings['DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER'] = 'NO'
                config.build_settings['MACCATALYST_APPLICATION_IDENTIFIER']           = 'com.naturabridge.business'
                config.build_settings['MACOSX_DEPLOYMENT_TARGET']                    = '13.0'
              end
            end
            project.save
          RUBY

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up code signing
        script: |
          keychain initialize

          app-store-connect fetch-signing-files \
            --bundle-id "$BUNDLE_ID" \
            --type MAC_APP_STORE \
            --certificate-types MAC_APP_DISTRIBUTION \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create \
            --save

          keychain add-certificates

          CERT_NAME=$(security find-identity -v -p codesigning | grep "3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.provisionprofile" -o -name "*.mobileprovision" | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID xml1 -o - - | sed 's/.*<string>\(.*\)<\/string>.*/\1/')

          echo "CODE_SIGNING_IDENTITY=$CERT_NAME" >> $CM_ENV
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Copy ExportOptions
        script: |
          cp build-config/ExportOptions-macOS.plist ios/App/ExportOptions-macOS.plist

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build macOS archive (Mac Catalyst)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive" \
            -destination "platform=macOS,variant=Mac Catalyst" \
            OTHER_CODE_SIGN_FLAGS="--keychain $(echo $CM_KEYCHAIN_PATH)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_IDENTITY="$CODE_SIGNING_IDENTITY" \
            archive | xcpretty

      - name: Export macOS app
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive" \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist \
            -exportPath "$CM_BUILD_DIR/build/pkg-macos"

      - name: Upload macOS build to TestFlight
        script: |
          APP_FILE=$(find "$CM_BUILD_DIR/build/pkg-macos" \( -name "*.pkg" -o -name "*.app" \) | head -1)
          xcrun altool --upload-app \
            --file "$APP_FILE" \
            --type osx \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - $CM_BUILD_DIR/build/pkg-macos/**
      - $CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@alphainception.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
