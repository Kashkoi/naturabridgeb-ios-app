workflows:

  # ══════════════════════════════════════════════════════════════════
  # WORKFLOW 1 — NaturaBridgeB iOS (iPhone + iPad) → TestFlight
  # ══════════════════════════════════════════════════════════════════
  naturabridgeb-ios-testflight:
    name: "NaturaBridgeB — iPhone + iPad → TestFlight"
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      groups:
        - app-store-connect
        - ios-signing
      vars:
        BUNDLE_ID:     "com.naturabridge.business"
        APPLE_TEAM_ID: "V44J4P68PU"
      node: "20"
      xcode: latest
      cocoapods: "1.15.2"

    scripts:

      - name: Install Node dependencies
        script: npm ci

      - name: Generate iOS project
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up code signing
        script: |
          keychain initialize

          # Write private key to file — avoids multiline env var quoting issues
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "@file:/tmp/asc_key.p8" \
            --create

          keychain add-certificates

          echo "=== Identities after fetch ==="
          security find-identity -v -p codesigning
          echo "=============================="

          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID xml1 -o - - | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          CERT_NAME=$(security find-identity -v -p codesigning | grep -v "REVOKED" | grep -oE '"[^"]+"' | head -1 | tr -d '"')

          echo "Cert: $CERT_NAME"
          echo "Profile UUID: $PROFILE_UUID"
          echo "CODE_SIGNING_IDENTITY=$CERT_NAME" >> "$CM_ENV"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$CM_ENV"

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build iOS archive
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive" \
            -destination "generic/platform=iOS" \
            OTHER_CODE_SIGN_FLAGS="--keychain $(echo $CM_KEYCHAIN_PATH)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_IDENTITY="$CODE_SIGNING_IDENTITY" \
            archive | xcpretty

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive" \
            -exportOptionsPlist build-config/ExportOptions-iOS.plist \
            -exportPath "$CM_BUILD_DIR/build/ipa-ios"

    artifacts:
      - $CM_BUILD_DIR/build/ipa-ios/*.ipa
      - $CM_BUILD_DIR/build/NaturaBridgeB-iOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@alphainception.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"


  # ══════════════════════════════════════════════════════════════════
  # WORKFLOW 2 — NaturaBridgeB macOS (Mac Catalyst) → TestFlight
  # ══════════════════════════════════════════════════════════════════
  naturabridgeb-macos-testflight:
    name: "NaturaBridgeB — Mac → TestFlight"
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      groups:
        - app-store-connect
        - ios-signing
      vars:
        BUNDLE_ID:     "com.naturabridge.business"
        APPLE_TEAM_ID: "V44J4P68PU"
      node: "20"
      xcode: latest
      cocoapods: "1.15.2"

    scripts:

      - name: Install Node dependencies
        script: npm ci

      - name: Generate iOS project
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Enable Mac Catalyst
        script: |
          gem install xcodeproj --quiet
          ruby << 'RUBY'
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
            project.targets.each do |target|
              next unless target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['SUPPORTS_MACCATALYST']                        = 'YES'
                config.build_settings['DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER'] = 'NO'
                config.build_settings['MACCATALYST_APPLICATION_IDENTIFIER']           = 'com.naturabridge.business'
                config.build_settings['MACOSX_DEPLOYMENT_TARGET']                    = '13.0'
              end
            end
            project.save
          RUBY

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build macOS archive (Mac Catalyst)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive" \
            -destination "platform=macOS,variant=Mac Catalyst" \
            OTHER_CODE_SIGN_FLAGS="--keychain $(echo $CM_KEYCHAIN_PATH)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPECIFIER" \
            CODE_SIGN_IDENTITY="$CODE_SIGNING_IDENTITY" \
            archive | xcpretty

      - name: Export macOS app
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive" \
            -exportOptionsPlist build-config/ExportOptions-macOS.plist \
            -exportPath "$CM_BUILD_DIR/build/pkg-macos"

    artifacts:
      - $CM_BUILD_DIR/build/pkg-macos/**
      - $CM_BUILD_DIR/build/NaturaBridgeB-macOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@alphainception.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
